alias _menu_inSMG2 "touch_settexture \"_menu_text\" \"#A jack-of-all-trades weapon with a great balance of damage, fire rate, and accuracy—at both short and mid range. It haunts the corners of every map and requires only steady aim to drop foes at long distance.\""

alias _menu_inSG1 "touch_settexture \"_menu_text\" \"#Heavy but stable, Bucky’s primary fire is for holding tight corners or charging close quarters. Alternate fire strikes targets at medium range.\""

alias _menu_inSG2 "touch_settexture \"_menu_text\" \"#The Judge is stable at the stand but volatile when fired rapidly. Primary fire hammers short range targets and you’ll need to be steady to nail anything beyond an arm's-length.\""

