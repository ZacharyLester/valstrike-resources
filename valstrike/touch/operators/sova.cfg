alias _menu_inRIF3 "touch_settexture \"_menu_text\" \"#Go full auto for anyone who tests you up close and short controlled bursts scramble enemies from anywhere. Best when fired while stationary.\""

alias _menu_inRIF4 "touch_settexture \"_menu_text\" \"#Extended fire results in less stability, however. The Vandal retains high damage over distance and rewards those who focus single shots at a target’s head.\""

