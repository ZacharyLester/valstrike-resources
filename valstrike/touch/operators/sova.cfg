alias _menu_inP1 "touch_settexture \"_menu_text\" \"#Primary fire lands precise shots when still, and is equipped with an alternate burst-firing mode for close encounters.\""

alias _menu_inP2 "touch_settexture \"_menu_text\" \"#Lightweight machine pistol that excels at firing on the move. It’s high rate-of-fire can be difficult to control, so try short bursts at medium ranges.\""

alias _menu_inP3 "touch_settexture \"_menu_text\" \"#The Ghost is accurate and carries a large magazine if you miss. Distant targets require a controlled fire rate. Quickly tap the trigger when you can see the whites of their eyes.\""

alias _menu_inP4 "touch_settexture \"_menu_text\" \"#It’s high-impact rounds pack a ton of recoil and require true grit to master. Wield the Sheriff right, and your enemies will know they were expendable.\""

alias _menu_inP5 "touch_settexture \"_menu_text\" \"#A nimble, short barrel shotgun that is deadly at close range but can only fire twice before needing to reload. Pairs well with long range weapons.\""

alias _menu_inP6 "touch_settexture \"_menu_text\" \"#The Bandit is a precision Pistol with steady semi-automatic fire that delivers lethal headshots at close and medium ranges.\""

