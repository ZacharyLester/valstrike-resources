//info agent 
alias _menu_a_IA1 "touch_settexture \"_menu_a_infoab\" \"@0.5Joining from the U.S.A., Brimstone's orbital arsenal ensures his squad always has the advantage. His ability to deliver utility precisely and from a distance make him an unmatched boots-on-the-ground commander.\""

alias _menu_a_IA2 "touch_settexture \"_menu_a_infoab\" \"@0.5The bastion of China, Sage creates safety for herself and her team wherever she goes. Able to revive fallen friends and stave off aggressive pushes, she provides a calm center to a hellish fight.\""

alias _menu_a_IA3 "touch_settexture \"_menu_a_infoab\" \"@0.5Hailing from the U.K., Phoenix's star power shines through in his fighting style, igniting the battlefield with flash and flare. Whether he's got backup or not, he'll rush into a fight on his own terms.\""

alias _menu_a_IA4 "touch_settexture \"_menu_a_infoab\" \"@0.5Born from the eternal winter of Russia's tundra, Sova tracks, finds, and eliminates enemies with ruthless efficiency and precision. His custom bow and incredible scouting abilities ensure that even if you run, you cannot hide.\""

alias _menu_a_IA5 "touch_settexture \"_menu_a_infoab\" \"@0.5Representing her home country of South Korea, Jett's agile and evasive fighting style lets her take risks no one else can. She runs circles around every skirmish, cutting enemies before they even know what hit them.\""

alias _menu_a_IA6 "touch_settexture \"_menu_a_infoab\" \"@0.5Hailing from Australia, Skye and her band of beasts trail-blaze the way through hostile territory. With her creations hampering the enemy, and her power to heal others, the team is strongest and safest by Skye's side.\""

alias _menu_a_IA7 "touch_settexture \"_menu_a_infoab\" \"@0.5Raze explodes out of Brazil with her big personality and big guns. With her blunt-force-trauma playstyle, she excels at flushing entrenched enemies and clearing tight spaces with a generous dose of “boom.”\""

alias _menu_a_IA8 "touch_settexture \"_menu_a_infoab\" \"@0.5Forged in the heart of Mexico, Reyna dominates single combat, popping off with each kill she scores. Her capability is only limited by her raw skill, making her highly dependent on performance.\""

//alias _menu_a_IA9 "touch_settexture \"_menu_a_infoab\" \"@0.5Japanese native Yoru rips holes straight through reality to infiltrate enemy lines unseen. Using deception and aggression in equal measure, he gets the drop on each target before they know where to look.\""

//alias _menu_a_IA10 "touch_settexture \"_menu_a_infoab\" \"@0.5KAY/O is a machine of war built for a single purpose: neutralizing radiants. His power to suppress enemy abilities dismantles his opponents' capacity to fight back, securing him and his allies the ultimate edge.\""

//alias _menu_a_IA11 "touch_settexture \"_menu_a_infoab\" \"@0.5The American chemist, Viper deploys an array of poisonous chemical devices to control the battlefield and choke the enemy's vision. If the toxins don't kill her prey, her mind games surely will.\""

//alias _menu_a_IA12 "touch_settexture \"_menu_a_infoab\" \"@0.5The genius of Germany, Killjoy effortlessly secures key battlefield positions with her arsenal of inventions. If their damage doesn't take her enemies out, the debuff her robots provide will make short work of them.\""

//alias _menu_a_IA13 "touch_settexture \"_menu_a_infoab\" \"@0.5A phantom of a memory, Omen hunts in the shadows. He renders enemies blind, teleports across the field, then lets paranoia take hold as his foe scrambles to learn where he might strike next.\""



